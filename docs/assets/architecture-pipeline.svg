<svg xmlns="http://www.w3.org/2000/svg" width="960" height="280" viewBox="0 0 960 280" role="img" aria-labelledby="title desc">
  <title id="title">Tool-Semantics pipeline</title>
  <desc id="desc">Manifest flows through scanner, snapshot, diff engine, and report outputs.</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="8" refX="8" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 Z" fill="#1f2933"/>
    </marker>
  </defs>
  <rect width="960" height="280" fill="#f5f3ef"/>
  <text x="32" y="36" font-family="ui-sans-serif, system-ui, sans-serif" font-size="18" font-weight="700" fill="#1f2933">Tool-Semantics pipeline</text>
  <text x="32" y="58" font-family="ui-sans-serif, system-ui, sans-serif" font-size="12" fill="#5b6570">Schema-valid ` agent-safe</text>

  <rect x="32" y="100" width="170" height="88" rx="6" fill="#ffffff" stroke="#1f2933" stroke-width="1.5"/>
  <text x="117" y="138" text-anchor="middle" font-family="ui-sans-serif, system-ui, sans-serif" font-size="14" font-weight="700" fill="#1f2933">Manifest / MCP</text>
  <text x="117" y="160" text-anchor="middle" font-family="ui-sans-serif, system-ui, sans-serif" font-size="11" fill="#5b6570">tools + schemas</text>

  <line x1="202" y1="144" x2="248" y2="144" stroke="#1f2933" stroke-width="1.5" marker-end="url(#arrow)"/>

  <rect x="250" y="100" width="150" height="88" rx="6" fill="#ffffff" stroke="#0d9488" stroke-width="2"/>
  <text x="325" y="138" text-anchor="middle" font-family="ui-sans-serif, system-ui, sans-serif" font-size="14" font-weight="700" fill="#1f2933">Snapshot</text>
  <text x="325" y="160" text-anchor="middle" font-family="ui-sans-serif, system-ui, sans-serif" font-size="11" fill="#5b6570">normalized contracts</text>

  <line x1="400" y1="144" x2="446" y2="144" stroke="#1f2933" stroke-width="1.5" marker-end="url(#arrow)"/>

  <rect x="448" y="100" width="160" height="88" rx="6" fill="#ffffff" stroke="#f59e0b" stroke-width="2"/>
  <text x="528" y="138" text-anchor="middle" font-family="ui-sans-serif, system-ui, sans-serif" font-size="14" font-weight="700" fill="#1f2933">Diff engine</text>
  <text x="528" y="160" text-anchor="middle" font-family="ui-sans-serif, system-ui, sans-serif" font-size="11" fill="#5b6570">codes + severity</text>

  <line x1="608" y1="144" x2="654" y2="144" stroke="#1f2933" stroke-width="1.5" marker-end="url(#arrow)"/>

  <rect x="656" y="100" width="270" height="88" rx="6" fill="#ffffff" stroke="#1f2933" stroke-width="1.5"/>
  <text x="791" y="132" text-anchor="middle" font-family="ui-sans-serif, system-ui, sans-serif" font-size="14" font-weight="700" fill="#1f2933">Report</text>
  <text x="791" y="154" text-anchor="middle" font-family="ui-sans-serif, system-ui, sans-serif" font-size="11" fill="#5b6570">CLI · Markdown · JSON · CI exits</text>
  <text x="791" y="172" text-anchor="middle" font-family="ui-sans-serif, system-ui, sans-serif" font-size="11" fill="#b45309">breaking / critical ’ exit 1</text>

  <rect x="32" y="220" width="12" height="12" fill="#0d9488"/>
  <text x="52" y="230" font-family="ui-sans-serif, system-ui, sans-serif" font-size="11" fill="#5b6570">normalized</text>
  <rect x="140" y="220" width="12" height="12" fill="#f59e0b"/>
  <text x="160" y="230" font-family="ui-sans-serif, system-ui, sans-serif" font-size="11" fill="#5b6570">semantic risk</text>
